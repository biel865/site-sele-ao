<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Top 10 - Copa 2026</title>

    <style>
        body{
            background: linear-gradient(180deg,#0d1b2a,#1b263b);
            color: white;
            font-family: Arial;
        }

        .cbc{
            display:flex;
            justify-content:center;
            align-items:center;
            height:150px;
            background: linear-gradient(90deg,#009c3b,#ffdf00);
        }

        #texto{
            font-size:2.5rem;
            font-style:italic;
            text-align:center;
        }

        .card{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            margin-top:30px;
        }

        .carda{
            width:220px;
            background:#1b263b;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.5);
            transition:0.3s;
            text-align:center;
        }

        .carda img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .carda:hover{
            transform:scale(1.1);
        }

        .nome{
            padding:10px;
        }
    </style>
</head>

<body>

<header class="cbc">
    <h1 id="texto">🔥 Top 10 (Previsão) - Copa 2026</h1>
</header>

<div class="card">

    <div class="carda">
        <img src="img/mbape.jpg">
        <div class="nome"><h2>🥇 Mbappé</h2></div>
    </div>

    <div class="carda">
        <img src="img/messi.jpg">
        <div class="nome"><h2>🥈 Messi</h2></div>
    </div>

    <div class="carda">
        <img src="img/haland.jpg">
        <div class="nome"><h2>🥉 Haaland</h2></div>
    </div>

    <div class="carda">
        <img src="img/vini.jpg">
        <div class="nome"><h2>4º Vinicius Jr</h2></div>
    </div>

    <div class="carda">
        <img src="img/beligol.jpg">
        <div class="nome"><h2>5º Bellingham</h2></div>
    </div>

    <div class="carda">
        <img src="img/rodrigo.jpg">
        <div class="nome"><h2>6º Rodrygo</h2></div>
    </div>

    <div class="carda">
        <img src="img/pedri.jpg">
        <div class="nome"><h2>7º Pedri</h2></div>
    </div>

    <div class="carda">
        <img src="img/musiala.jpg">
        <div class="nome"><h2>8º Musiala</h2></div>
    </div>

    <div class="carda">
        <img src="img/kane.jpg">
        <div class="nome"><h2>9º Harry Kane</h2></div>
    </div>

    <div class="carda">
        <img src="img/endrik.jpg">
        <div class="nome"><h2>10º Endrick</h2></div>
    </div>

</div>

</body>
</html>
